name: Risk-tier labeler

# pull_request_target so fork PRs get labeled too. Safe: the labeler only
# reads .github/labeler.yml from the BASE branch and never checks out or
# executes PR code.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: false
