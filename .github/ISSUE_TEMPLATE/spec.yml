name: Spec (agent-ready task)
description: A task specified well enough for autonomous implementation.
labels: []
body:
  - type: markdown
    attributes:
      value: |
        A good spec is the highest-leverage artifact in this pipeline: agents
        implement exactly what is written here, and the scope gate holds the
        PR to it. Add the `agent-ok` label once it is ready to be picked up.
  - type: textarea
    id: problem
    attributes:
      label: Problem / goal
      description: What should be different afterwards, and for whom?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checkable statements. The PR is done when these are true.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Out of scope
      description: What must NOT be part of this change (guards the scope gate).
  - type: textarea
    id: pointers
    attributes:
      label: Pointers
      description: Relevant files, endpoints, docs, prior PRs.
