[alembic]
script_location = migrations
# Make `backend` importable when alembic is invoked from the repo root.
prepend_sys_path = .
# The database URL comes exclusively from the DATABASE_URL env var (enforced
# in migrations/env.py) — no implicit .env fallback, so a stray `alembic
# upgrade` can never silently target the wrong database.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
