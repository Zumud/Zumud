[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
# Defaults (E4/E7/E9 + pyflakes) plus import sorting. Style is owned by
# `ruff format`; we deliberately don't enable the wider stylistic rule sets.
extend-select = ["I"]

[tool.importlinter]
root_package = "backend"

# Architectural layering: routers call services, services use helpers and
# schemas, nothing imports upward. Violations fail CI (backend job).
[[tool.importlinter.contracts]]
name = "Layered architecture (api -> core -> utils -> models -> config)"
type = "layers"
layers = [
    "backend.api",
    "backend.core",
    "backend.utils",
    "backend.models",
    "backend.config",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: needs the local Supabase stack (run via `make test-integration` or CI)",
    "real_ai: hits the live OpenAI API (merge queue / nightly lane; needs OPEN_AI_KEY)",
]
# Unit lane by default; integration/real-AI lanes opt in explicitly.
addopts = "-m 'not integration and not real_ai'"
