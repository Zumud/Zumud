[tool.ruff]
target-version = "py312"
extend-exclude = ["backend/utils/old_codes.py"]

[tool.ruff.lint]
# Defaults (E4/E7/E9 + pyflakes) plus import sorting. Style is owned by
# `ruff format`; we deliberately don't enable the wider stylistic rule sets.
extend-select = ["I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: needs the local Supabase stack (run via `make test-integration` or CI)",
    "real_ai: hits the live OpenAI API (merge queue / nightly lane; needs OPEN_AI_KEY)",
]
# Unit lane by default; integration/real-AI lanes opt in explicitly.
addopts = "-m 'not integration and not real_ai'"
