<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradientTwitter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradientTwitter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D946EF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradientTwitter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradientTwitter)" />
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="80" fill="url(#iconGradientTwitter)" opacity="0.1" />
  <circle cx="1100" cy="530" r="120" fill="url(#textGradientTwitter)" opacity="0.1" />
  
  <!-- Logo -->
  <g transform="translate(200, 200)">
    <!-- Icon - Document Design -->
    <path d="M0 50 Q0 0 50 0 L130 0 L180 50 L180 130 Q180 180 130 180 L50 180 Q0 180 0 130 Z" fill="url(#iconGradientTwitter)" />
    <path d="M130 0 L180 50 L130 50 Z" fill="url(#iconGradientTwitter)" opacity="0.7" />
    <path d="M130 0 L130 50 L180 50" stroke="rgba(255,255,255,0.3)" stroke-width="3" fill="none" />
    
    <!-- Text -->
    <text x="220" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="700" fill="url(#textGradientTwitter)">Zumud</text>
  </g>
  
  <!-- Tagline -->
  <text x="600" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="400" fill="#64748b">AI-Powered Resume Builder</text>
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="300" fill="#94a3b8">Get 3× more interviews with tailored resumes</text>
</svg>
